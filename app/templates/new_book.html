{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center pt-3">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary bg-opacity-75 text-white py-3">
                <h4 class="mb-0 fw-bold text-center">新增書目資料表單</h4>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('book.create_book_action') }}" method="POST">
                    
                    <div class="mb-4">
                        <label for="title" class="form-label text-secondary fw-semibold">圖書名稱 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="title" name="title" value="{{ title|default('') }}" placeholder="例如：原子習慣" required autofocus>
                    </div>
                    
                    <div class="mb-4">
                        <label for="author" class="form-label text-secondary fw-semibold">作者</label>
                        <input type="text" class="form-control" id="author" name="author" value="{{ author|default('') }}" placeholder="例如：James Clear">
                    </div>
                    
                    <div class="mb-5">
                        <label for="inventory" class="form-label text-secondary fw-semibold">初始入庫數量</label>
                        <div class="input-group">
                            <input type="number" class="form-control" id="inventory" name="inventory" min="0" value="{{ inventory|default('0') }}">
                            <span class="input-group-text bg-light">本</span>
                        </div>
                        <div class="form-text mt-2 text-muted">若是建檔階段尚未到貨，可以保留為 0。</div>
                    </div>
                    
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('book.list_books') }}" class="btn btn-light px-4 border">取消返回</a>
                        <button type="submit" class="btn btn-primary px-4 fw-bold">確認新增</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
